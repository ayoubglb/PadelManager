name: Backend CI

"on":
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:

  # ==========================================================================
  # Stage 1 — Restore : récupération des dépendances Maven
  # ==========================================================================
  restore:
    name: Restore dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download Maven dependencies
        run: ./mvnw -B dependency:go-offline

  # ==========================================================================
  # Stage 2 — Build : compilation du code
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile
        run: ./mvnw -B compile

  # ==========================================================================
  # Stage 3 — Tests : unitaires + intégration
  # ==========================================================================
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ==========================================================================
  # Stage 4 — Coverage : rapport de couverture Jacoco
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Generate coverage report
        run: ./mvnw -B verify

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 7
# docker-compose.yml
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: padelmanager-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Padel_SA_Pass_2026!"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "French_CI_AI"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./docker/mssql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -N -b -t 3 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        SERVER_PID=$$!
        echo "Waiting for SQL Server to be ready..."
        for i in {1..60}; do
          if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -N -b -t 3 &> /dev/null; then
            echo "SQL Server is ready. Running init scripts..."
            for f in /docker-entrypoint-initdb.d/*.sql; do
              if [ -f "$$f" ]; then
                echo "Executing $$f..."
                /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -i "$$f" -C -N -b
              fi
            done
            echo "Init scripts done."
            break
          fi
          echo "Attempt $$i/60 - waiting..."
          sleep 2
        done
        wait $$SERVER_PID

volumes:
  mssql-data:
    name: padelmanager-mssql-data
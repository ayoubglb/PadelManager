# =============================================================================
# Application Padel Manager
# =============================================================================
spring.application.name=padelmanager
server.port=8080

# =============================================================================
# Base de donnees applicative (SQL Server via Docker)
# Utilisateur padel_app : DML uniquement, aucun droit DDL
# =============================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=PadelManager;encrypt=true;trustServerCertificate=true
spring.datasource.username=padel_app
spring.datasource.password=Padel_App_2026!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# =============================================================================
# Liquibase (migrations de schema)
# Utilisateur padel_liquibase : DDL + DML, different de padel_app
# =============================================================================
spring.liquibase.enabled=true
spring.liquibase.url=${spring.datasource.url}
spring.liquibase.user=padel_liquibase
spring.liquibase.password=Padel_Liquibase_2026!
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Contexte Liquibase : active les seed de dev en local.
spring.liquibase.contexts=dev

# =============================================================================
# Locale et timezone
# =============================================================================
spring.web.locale=fr_BE
spring.web.locale-resolver=fixed
spring.jackson.time-zone=Europe/Brussels

# =============================================================================
# Logging
# =============================================================================
logging.level.root=INFO
logging.level.be.ephec.padelmanager=DEBUG
logging.level.org.springframework.web=INFO
logging.level.liquibase=INFO

# =============================================================================
# Swagger / OpenAPI
# URL principale : http://localhost:8080/swagger-ui/index.html
# =============================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# =============================================================================
# Securite JWT
# Le secret DOIT venir de la variable d'environnement JWT_SECRET en production.
# Pour le dev local, fallback sur une valeur par defaut (changer avant deploiement).
# Longueur minimum : 32 caracteres ASCII (256 bits pour HS256).
# =============================================================================
padelmanager.securite.jwt.secret=${JWT_SECRET:dev-secret-change-me-in-production-minimum-32-chars-long}
padelmanager.securite.jwt.expiration-minutes=60
padelmanager.securite.jwt.header=Authorization
padelmanager.securite.jwt.prefixe=Bearer 
# ========================================================
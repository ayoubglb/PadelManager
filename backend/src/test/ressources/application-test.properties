# Profil "test" utilisť par AuthIntegrationTest.
# Les URLs DB sont fournies dynamiquement par Testcontainers via @DynamicPropertySource.

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Secret JWT fixe pour les tests (pas besoin de variable d'environnement)
padelmanager.securite.jwt.secret=test-jwt-secret-minimum-32-chars-long-for-hs256!
padelmanager.securite.jwt.expiration-minutes=60
padelmanager.securite.jwt.header=Authorization
padelmanager.securite.jwt.prefixe=Bearer\ 

logging.level.org.testcontainers=INFO
logging.level.liquibase=INFO
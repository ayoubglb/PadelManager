<mat-card class="hover:shadow-md transition-shadow">
  <mat-card-content class="!p-4">
    <!-- Ligne 1 : Date + places restantes -->
    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
      <div class="flex items-center gap-2 leading-none">
        <mat-icon class="!text-base !w-4 !h-4 !leading-none text-blue-600">event</mat-icon>
        <span class="font-semibold text-gray-800">
          {{ dateObj() | date:'EEEE dd MMMM yyyy':'':'fr-BE' }}
        </span>
        <span class="text-sm text-gray-500">·</span>
        <span class="text-sm text-gray-700">
          {{ formatTime(dateObj()) }} – {{ formatTime(endDateObj()) }}
        </span>
      </div>

      <mat-chip [class]="placesChipClass()">
        {{ placesLabel() }}
      </mat-chip>
    </div>

    <!-- Ligne 2 : Lieu -->
    <div class="flex items-center gap-2 text-sm text-gray-700 mb-2 leading-none">
      <mat-icon class="!text-base !w-4 !h-4 !leading-none text-gray-400">apartment</mat-icon>
      <span class="font-medium">{{ match().siteNom }}</span>
      <span class="text-gray-500">·</span>
      <span>Terrain {{ match().terrainNumero }}</span>
    </div>

    <!-- Ligne 3 : Organisateur -->
    <div class="flex items-center gap-2 text-sm text-gray-700 leading-none">
      <mat-icon class="!text-base !w-4 !h-4 !leading-none text-gray-400">person</mat-icon>
      <span>Organisé par <span class="font-medium">{{ match().organisateurNom }}</span></span>
    </div>
  </mat-card-content>

  <mat-card-actions align="end" class="!pt-0">
    <button mat-flat-button color="primary" (click)="onDetailClick()">
      <mat-icon>visibility</mat-icon>
      Voir le détail
    </button>
  </mat-card-actions>
</mat-card>
